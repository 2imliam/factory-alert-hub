<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Modern WinForms Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f3f4f6",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4 font-display">
<!-- Login Container (Simulating the 500x520 WinForms Card) -->
<div class="w-full max-w-[500px] bg-white dark:bg-[#1a2133] rounded-xl shadow-2xl overflow-hidden flex flex-col items-center p-8 md:p-12 border border-gray-200 dark:border-gray-800">
<!-- App Logo Placeholder -->
<div class="w-20 h-20 bg-primary/10 dark:bg-primary/20 rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary text-4xl">
                desktop_windows
            </span>
</div>
<!-- Headline Text -->
<h1 class="text-[#0d121b] dark:text-white tracking-tight text-[32px] font-bold leading-tight text-center pb-8">
            LOGIN
        </h1>
<!-- Form Section -->
<form class="w-full space-y-4">
    <!-- Username TextField -->

    <div class="flex flex-col w-full">
        <p class="text-[#0d121b] dark:text-gray-300 text-sm font-medium leading-normal pb-1.5">Username</p>
        <input id="user"
               class="form-input flex w-full rounded-lg text-[#0d121b] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#cfd7e7] dark:border-gray-700 bg-white dark:bg-[#101622] h-12 placeholder:text-[#4c669a] dark:placeholder:text-gray-500 p-[15px] text-base font-normal"
               placeholder="Enter your username" type="text" />

    </div>
    <!-- Password TextField -->
    <div class="flex flex-col w-full">
        <p class="text-[#0d121b] dark:text-gray-300 text-sm font-medium leading-normal pb-1.5">Password</p>
        <div class="flex w-full items-stretch rounded-lg group">
            <input id="pass"
                   class="form-input flex w-full min-w-0 flex-1 rounded-l-lg text-[#0d121b] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#cfd7e7] dark:border-gray-700 bg-white dark:bg-[#101622] h-12 placeholder:text-[#4c669a] dark:placeholder:text-gray-500 p-[15px] border-r-0 pr-2 text-base font-normal"
                   placeholder="Enter your password" type="password" />

            <div class="text-[#4c669a] dark:text-gray-500 flex border border-[#cfd7e7] dark:border-gray-700 bg-white dark:bg-[#101622] items-center justify-center px-3 rounded-r-lg border-l-0 cursor-pointer">
                <span class="material-symbols-outlined text-xl">visibility</span>
            </div>
        </div>
    </div>
    <!-- Remember Me Checkbox -->
    <div class="flex items-center gap-2 py-2">
        <input class="w-5 h-5 rounded border-[#cfd7e7] text-primary focus:ring-primary" id="remember" type="checkbox" />
        <label class="text-sm font-medium text-gray-600 dark:text-gray-400 cursor-pointer" for="remember">Remember me</label>
    </div>
    <!-- Login Button -->
    <button id="btnLogin"
            class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-3.5 rounded-lg transition-colors shadow-md mt-4"
            type="button">
        Login
    </button>

</form>
<!-- Footer Links -->
<div class="mt-6 text-center space-y-4">
<a class="text-primary hover:underline text-sm font-medium" href="#">Forgot password?</a>
<div class="pt-8 border-t border-gray-100 dark:border-gray-800 w-full">
    <p class="text-gray-400 dark:text-gray-600 text-xs font-normal">
        © 2026 Company
    </p>
    <script>
        const btn = document.getElementById("btnLogin");

        btn.addEventListener("click", () => {
            const user = document.getElementById("user").value.trim();
            const pass = document.getElementById("pass").value;

            window.chrome.webview.postMessage({
                action: "login",
                user,
                pass
            });
        });

        // nhận phản hồi từ C#
        window.chrome.webview.addEventListener("message", (event) => {
            const data = event.data;
            if (data?.ok) {
                // không cần alert, vì C# sẽ tự chuyển trang
                // alert("Login OK");
            } else {
                alert(data?.error || "Login failed");
            }
        });
    </script>


</body></html>
