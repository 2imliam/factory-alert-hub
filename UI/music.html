                              <body class="bg-background-light dark:bg-background-dark font-display text-[#0d141b] dark:text-white overflow-x-hidden min-h-screen flex flex-col justify-center items-center">

                                              </button>

                                      </div>
                                  </main>
                                  <script>
                                      function applyRunning(running) {
                                          // Ví dụ: bỏ mờ + mở click
                                          document.querySelectorAll(".feature-card, .feature-item").forEach(el => {
                                              el.classList.toggle("pointer-events-none", !running);
                                              el.classList.toggle("opacity-50", !running);
                                              el.classList.toggle("blur-sm", !running);
                                          });

                                          const tip = document.getElementById("runTip");       // tooltip
                                          if (tip) tip.style.display = running ? "none" : "block";
                                      }

                                      if (window.chrome && window.chrome.webview) {
                                          window.chrome.webview.addEventListener("message", (event) => {
                                              const msg = event.data || {};
                                              if (msg.action === "set_running") {
                                                  applyRunning(!!msg.running);
                                              }
                                          });
                                      }
                                  </script>



                              </body></html>
